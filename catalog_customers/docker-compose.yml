version: '3.8'

services:
  postgres-db:
      image: postgres:15-alpine
      container_name: ${DB_CONTAINER_NAME}
      environment:
        POSTGRES_DB: ${DB_NAME}
        POSTGRES_USER: ${DB_USER}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
      ports:
        - "${DB_PORT}:5432" 
      volumes:
        - postgres_data:/var/lib/postgresql/data
      restart: unless-stopped

volumes:
  postgres_data: